<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acessar Laudo</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
width:350px;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#00a3a3;
border:none;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#008c8c;
}

.erro{
color:red;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>Acessar exame</h2>

{% if erro %}
<p class="erro">{{ erro }}</p>
{% endif %}

<input id="codigo" placeholder="Digite o código do exame">

<button onclick="buscarExame()">Buscar exame</button>

</div>

<script>

function buscarExame(){

let codigo = document.getElementById("codigo").value;

if(!codigo){
alert("Digite o código do exame");
return;
}

window.location.href = "/portal/" + codigo;

}

// permitir apertar ENTER
document.getElementById("codigo").addEventListener("keypress", function(e){
if(e.key === "Enter"){
buscarExame();
}
});

</script>

</body>
</html>
