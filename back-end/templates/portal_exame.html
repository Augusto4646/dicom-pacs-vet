<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Exame</title>

<style>

body{
font-family:Arial;
	background:#f5f5f5;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
}

.info{
margin-bottom:20px;
}

.laudo{
background:#fafafa;
padding:20px;
border-radius:8px;
border:1px solid #eee;
}

button{
margin-top:20px;
padding:10px 16px;
background:#00a3a3;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#008c8c;
}

.viewer{
margin-top:30px;
height:600px;
border:1px solid #ddd;
}

.viewer iframe{
width:100%;
height:100%;
border:none;
}

</style>
<div class="container">

<h1>Resultado do exameeee</h1>

<div class="info">
<strong>Código:</strong> {{ exame.codigo_acesso }} <br>
<strong>Paciente:</strong> {{ exame.paciente.nome }} <br>
</div>

<h3>Laudo</h3>

<div class="laudo">
{{ exame.laudo_html|safe }}
</div>

<!-- 🔥 BOTÕES -->
<div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">

<button onclick="mostrarImagens()">
    Ver imagens
</button>

{% if exame.pdf %}
<a href="{{ exame.pdf.url }}" target="_blank" style="text-decoration:none;">
    <span style="
        display:inline-block;
        padding:10px 16px;
        background:#007bff;
        color:white;
        border-radius:6px;
        cursor:pointer;
    ">
        Baixar PDF
    </span>
</a>
{% endif %}

</div>

<!-- 🔥 VIEWER -->
<div id="viewer" class="viewer" style="display:none; margin-top:20px;">

<iframe 
    src="/viewer/viewer/dicomweb?StudyInstanceUIDs={{ exame.study_instance_uid }}">
</iframe>

</div>

</div>

<script>
function mostrarImagens(){
    document.getElementById("viewer").style.display = "block";
}
</script>
